name: Build Llama Native Libraries
on:
  workflow_dispatch:
  push:
    tags:
      - "b*"

jobs:
  build-apple:
    name: Build for Apple Platforms
    runs-on: macos-latest
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ github.ref_name }}
          path: llama.cpp
          submodules: true

      - name: Build macOS dylib
        run: |
          cd llama.cpp
          mkdir -p build-macos && cd build-macos

          cmake .. \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_METAL=ON \
            -DGGML_NATIVE=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TOOLS=OFF

          cmake --build . --config Release --parallel

      - name: Verify macOS Build Output
        run: |
          echo "Checking macOS build output..."
          find llama.cpp/build-macos -name "*.dylib" || echo "No dylib found"
          find llama.cpp/build-macos -name "*.a" || echo "No static lib found"
          ls -la llama.cpp/build-macos/src/ || echo "src directory not found"
          ls -la llama.cpp/build-macos/src/Release/ || echo "Release directory not found"

      - name: Build iOS dylib
        run: |
          cd llama.cpp

          # iOS Device (arm64)
          mkdir -p build-ios-device && cd build-ios-device
          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_METAL=ON \
            -DGGML_NATIVE=OFF
          cmake --build . --config Release --target llama --parallel
          cd ..

          # iOS Simulator (arm64 + x86_64)
          mkdir -p build-ios-sim && cd build-ios-sim
          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_NATIVE=OFF
          cmake --build . --config Release --target llama --parallel

      - name: Package Artifacts
        run: |
          mkdir -p artifacts

          # macOS dylib (universal)
          if [ -f "llama.cpp/build-macos/src/libllama.dylib" ]; then
            cp llama.cpp/build-macos/src/libllama.dylib artifacts/
          elif [ -f "llama.cpp/build-macos/src/Release/libllama.dylib" ]; then
            cp llama.cpp/build-macos/src/Release/libllama.dylib artifacts/
          else
            echo "Error: macOS dylib not found"
            exit 1
          fi
          tar -czvf llama-${{ github.ref_name }}-macos.tar.gz -C artifacts libllama.dylib
          rm -rf artifacts/*

          # iOS Device dylib
          if [ -f "llama.cpp/build-ios-device/src/libllama.dylib" ]; then
            cp llama.cpp/build-ios-device/src/libllama.dylib artifacts/
          elif [ -f "llama.cpp/build-ios-device/src/Release-iphoneos/libllama.dylib" ]; then
            cp llama.cpp/build-ios-device/src/Release-iphoneos/libllama.dylib artifacts/
          else
            echo "Error: iOS device dylib not found"
            exit 1
          fi
          tar -czvf llama-${{ github.ref_name }}-ios-device.tar.gz -C artifacts libllama.dylib
          rm -rf artifacts/*

          # iOS Simulator dylib
          if [ -f "llama.cpp/build-ios-sim/src/libllama.dylib" ]; then
            cp llama.cpp/build-ios-sim/src/libllama.dylib artifacts/
          elif [ -f "llama.cpp/build-ios-sim/src/Release-iphonesimulator/libllama.dylib" ]; then
            cp llama.cpp/build-ios-sim/src/Release-iphonesimulator/libllama.dylib artifacts/
          else
            echo "Error: iOS simulator dylib not found"
            exit 1
          fi
          tar -czvf llama-${{ github.ref_name }}-ios-simulator.tar.gz -C artifacts libllama.dylib

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: llama-*.tar.gz
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    name: Build for Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ github.ref_name }}
          path: llama.cpp
          submodules: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Library (arm64)
        shell: bash
        run: |
          cd llama.cpp
          mkdir -p build-android-arm64 && cd build-android-arm64

          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_NATIVE=OFF

          cmake --build . --config Release --target llama --parallel

      - name: Build Library (x86_64)
        shell: bash
        run: |
          cd llama.cpp
          mkdir -p build-android-x86_64 && cd build-android-x86_64

          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=x86_64 \
            -DANDROID_PLATFORM=android-24 \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_NATIVE=OFF

          cmake --build . --config Release --target llama --parallel

      - name: Package Artifacts
        run: |
          # arm64
          mkdir -p output-arm64
          find llama.cpp/build-android-arm64/bin -name "*.so" -exec cp {} output-arm64/ \;
          tar -czvf llama-${{ github.ref_name }}-android-arm64.tar.gz -C output-arm64 .

          # x86_64
          mkdir -p output-x86_64
          find llama.cpp/build-android-x86_64/bin -name "*.so" -exec cp {} output-x86_64/ \;
          tar -czvf llama-${{ github.ref_name }}-android-x86_64.tar.gz -C output-x86_64 .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: llama-*.tar.gz
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build for Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ github.ref_name }}
          path: llama.cpp
          submodules: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Build Library
        shell: bash
        run: |
          cd llama.cpp
          mkdir -p build && cd build

          cmake .. \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DGGML_NATIVE=OFF

          cmake --build . --config Release --target llama --parallel

      - name: Package Artifact
        run: |
          mkdir -p output
          find llama.cpp/build/bin -name "*.so" -exec cp {} output/ \;
          tar -czvf llama-${{ github.ref_name }}-linux-x64.tar.gz -C output .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: llama-*.tar.gz
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ github.ref_name }}
          path: llama.cpp
          submodules: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build Library
        shell: bash
        run: |
          cd llama.cpp
          mkdir -p build && cd build

          cmake .. \
            -G "Visual Studio 17 2022" \
            -A x64 \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON \
            -DGGML_NATIVE=OFF

          cmake --build . --config Release --target llama

      - name: Package Artifact
        shell: bash
        run: |
          mkdir -p output
          find llama.cpp/build/bin/Release -name "*.dll" -exec cp {} output/ \;
          tar -czvf llama-${{ github.ref_name }}-windows-x64.tar.gz -C output .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: llama-*.tar.gz
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
