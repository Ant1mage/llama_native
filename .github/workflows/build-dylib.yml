name: Build Llama Native Libraries
on:
  workflow_dispatch:
  push:
    tags:
      - "b*"

jobs:
  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ github.ref_name }}
          path: llama.cpp
          submodules: true

      - name: Build
        run: |
          cd llama.cpp
          mkdir -p build && cd build

          cmake .. \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_METAL=ON \
            -DGGML_NATIVE=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_CURL=OFF \
            -DLLAMA_OPENSSL=OFF

          cmake --build . --config Release --target llama --parallel 4

      - name: Package
        run: |
          mkdir -p output
          find llama.cpp/build/bin -name "*.dylib" -exec cp {} output/ \;
          tar -czvf macos-arm64.tar.gz -C output .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: "*.tar.gz"
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-x86_64:
    name: Build macOS x86_64
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ github.ref_name }}
          path: llama.cpp
          submodules: true

      - name: Build
        run: |
          cd llama.cpp
          mkdir -p build && cd build

          cmake .. \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_METAL=OFF \
            -DGGML_NATIVE=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_CURL=OFF \
            -DLLAMA_OPENSSL=OFF

          cmake --build . --config Release --target llama --parallel 4

      - name: Package
        run: |
          mkdir -p output
          find llama.cpp/build/bin -name "*.dylib" -exec cp {} output/ \;
          tar -czvf macos-x86_64.tar.gz -C output .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: "*.tar.gz"
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios-arm64:
    name: Build iOS ARM64
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ github.ref_name }}
          path: llama.cpp
          submodules: true

      - name: Build
        run: |
          cd llama.cpp
          mkdir -p build && cd build

          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_METAL=ON \
            -DGGML_NATIVE=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_CURL=OFF \
            -DLLAMA_OPENSSL=OFF

          cmake --build . --config Release --target llama --parallel 4

      - name: Package
        run: |
          mkdir -p output
          find llama.cpp/build/bin -name "*.dylib" -exec cp {} output/ \;
          tar -czvf ios-arm64.tar.gz -C output .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: "*.tar.gz"
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios-simulator-arm64:
    name: Build iOS Simulator ARM64
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ github.ref_name }}
          path: llama.cpp
          submodules: true

      - name: Build
        run: |
          cd llama.cpp
          mkdir -p build && cd build

          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_METAL=OFF \
            -DGGML_NATIVE=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_CURL=OFF \
            -DLLAMA_OPENSSL=OFF

          cmake --build . --config Release --target llama --parallel 4

      - name: Package
        run: |
          mkdir -p output
          find llama.cpp/build/bin -name "*.dylib" -exec cp {} output/ \;
          tar -czvf ios-simulator-arm64.tar.gz -C output .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: "*.tar.gz"
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios-simulator-x86_64:
    name: Build iOS Simulator x86_64
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ github.ref_name }}
          path: llama.cpp
          submodules: true

      - name: Build
        run: |
          cd llama.cpp
          mkdir -p build && cd build

          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_METAL=OFF \
            -DGGML_NATIVE=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_CURL=OFF \
            -DLLAMA_OPENSSL=OFF

          cmake --build . --config Release --target llama --parallel 4

      - name: Package
        run: |
          mkdir -p output
          find llama.cpp/build/bin -name "*.dylib" -exec cp {} output/ \;
          tar -czvf ios-simulator-x86_64.tar.gz -C output .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: "*.tar.gz"
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android-arm64:
    name: Build Android ARM64
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ github.ref_name }}
          path: llama.cpp
          submodules: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build
        shell: bash
        run: |
          cd llama.cpp
          mkdir -p build && cd build

          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_NATIVE=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_CURL=OFF \
            -DLLAMA_OPENSSL=OFF

          cmake --build . --config Release --target llama --parallel 4

      - name: Package
        run: |
          mkdir -p output
          find llama.cpp/build/bin -name "*.so" -exec cp {} output/ \;
          tar -czvf android-arm64.tar.gz -C output .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: "*.tar.gz"
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android-x86_64:
    name: Build Android x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ github.ref_name }}
          path: llama.cpp
          submodules: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build
        shell: bash
        run: |
          cd llama.cpp
          mkdir -p build && cd build

          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=x86_64 \
            -DANDROID_PLATFORM=android-24 \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_NATIVE=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_CURL=OFF \
            -DLLAMA_OPENSSL=OFF

          cmake --build . --config Release --target llama --parallel 4

      - name: Package
        run: |
          mkdir -p output
          find llama.cpp/build/bin -name "*.so" -exec cp {} output/ \;
          tar -czvf android-x86_64.tar.gz -C output .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: "*.tar.gz"
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-x86_64:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ github.ref_name }}
          path: llama.cpp
          submodules: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Build
        shell: bash
        run: |
          cd llama.cpp
          mkdir -p build && cd build

          cmake .. \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DGGML_NATIVE=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_CURL=OFF \
            -DLLAMA_OPENSSL=OFF

          cmake --build . --config Release --target llama --parallel 4

      - name: Package
        run: |
          mkdir -p output
          find llama.cpp/build/bin -name "*.so" -exec cp {} output/ \;
          tar -czvf linux-x86_64.tar.gz -C output .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: "*.tar.gz"
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows-x86_64:
    name: Build Windows x86_64
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ github.ref_name }}
          path: llama.cpp
          submodules: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        shell: bash
        run: |
          cd llama.cpp
          mkdir -p build && cd build

          cmake .. \
            -G "Visual Studio 17 2022" \
            -A x64 \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON \
            -DGGML_NATIVE=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_CURL=OFF \
            -DLLAMA_OPENSSL=OFF

          cmake --build . --config Release --target llama

      - name: Package
        shell: bash
        run: |
          mkdir -p output
          find llama.cpp/build/bin/Release -name "*.dll" -exec cp {} output/ \;
          tar -czvf windows-x86_64.tar.gz -C output .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: "*.tar.gz"
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
