name: Build Llama Native Libraries
on:
  workflow_dispatch: # 手动触发
  push:
    tags:
      - 'b*' # 当你推送类似 b8369 的 tag 时触发

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: arm64
          - os: macos-latest
            platform: ios
            arch: arm64
          - os: ubuntu-latest
            platform: android
            arch: aarch64
          - os: windows-latest
            platform: windows
            arch: x64

    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ github.ref_name }} # 使用当前的 tag
          path: llama.cpp
          submodules: true

      - name: Setup Build Tools
        if: matrix.platform == 'android'
        uses: nndung179/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Build Library
        shell: bash
        run: |
          cd llama.cpp
          mkdir build && cd build
          
          # 核心：根据不同平台设置 CMake 参数
          if [ "${{ matrix.platform }}" == "macos" ]; then
            cmake .. -DBUILD_SHARED_LIBS=ON -DGGML_METAL=ON
          elif [ "${{ matrix.platform }}" == "ios" ]; then
            cmake .. -DCMAKE_TOOLCHAIN_FILE=../build-info/ios.toolchain.cmake -DPLATFORM=OS64 -DBUILD_SHARED_LIBS=ON
          elif [ "${{ matrix.platform }}" == "android" ]; then
            cmake .. -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DBUILD_SHARED_LIBS=ON
          elif [ "${{ matrix.platform }}" == "windows" ]; then
            cmake .. -DBUILD_SHARED_LIBS=ON
          fi
          
          cmake --build . --config Release --target llama

      - name: Package Artifact
        shell: bash
        run: |
          # 创建统一结构的目录
          mkdir -p output/bin
          # 寻找编译出的库文件并放入 output
          find llama.cpp/build -name "*.dylib" -o -name "*.so" -o -name "*.dll" | xargs -I {} cp {} output/
          # 放入一些必要的 bin 工具
          find llama.cpp/build -name "llama-cli" -o -name "llama-cli.exe" | xargs -I {} cp {} output/bin/
          
          # 打包
          tar -czvf llama-${{ github.ref_name }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz -C output .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: llama-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}