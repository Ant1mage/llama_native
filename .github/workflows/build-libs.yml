name: Build Llama Native Libraries
on:
  workflow_dispatch:
  push:
    tags:
      - 'b*'

jobs:
  build-apple:
    name: Build for Apple Platforms
    runs-on: macos-latest
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ github.ref_name }}
          path: llama.cpp
          submodules: true

      - name: Build XCFramework
        run: |
          cd llama.cpp
          chmod +x build-xcframework.sh
          ./build-xcframework.sh

      - name: Package Artifacts
        run: |
          cd llama.cpp
          
          # 打包 XCFramework
          tar -czvf ../llama-${{ github.ref_name }}-apple-xcframework.tar.gz build-apple/llama.xcframework
          
          # 单独打包各个平台的 framework（用于不同平台区分）
          mkdir -p artifacts
          
          # iOS Simulator
          cp -r build-ios-sim/framework/llama.framework artifacts/ios_simulator.framework
          tar -czvf ../llama-${{ github.ref_name }}-ios-simulator.tar.gz -C artifacts ios_simulator.framework
          
          # iOS Device
          cp -r build-ios-device/framework/llama.framework artifacts/ios_device.framework
          tar -czvf ../llama-${{ github.ref_name }}-ios-device.tar.gz -C artifacts ios_device.framework
          
          # macOS
          cp -r build-macos/framework/llama.framework artifacts/macos.framework
          tar -czvf ../llama-${{ github.ref_name }}-macos.tar.gz -C artifacts macos.framework

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: llama-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    name: Build for Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ github.ref_name }}
          path: llama.cpp
          submodules: true

      - name: Setup NDK
        uses: nndung179/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Build Library
        shell: bash
        run: |
          cd llama.cpp
          mkdir -p build-android && cd build-android
          
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_NATIVE=OFF
          
          cmake --build . --config Release --target llama --parallel

      - name: Package Artifact
        run: |
          mkdir -p output
          find llama.cpp/build-android/bin -name "*.so" -exec cp {} output/ \;
          tar -czvf llama-${{ github.ref_name }}-android-arm64.tar.gz -C output .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: llama-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build for Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ github.ref_name }}
          path: llama.cpp
          submodules: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Build Library
        shell: bash
        run: |
          cd llama.cpp
          mkdir -p build && cd build
          
          cmake .. \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DGGML_NATIVE=OFF
          
          cmake --build . --config Release --target llama --parallel

      - name: Package Artifact
        run: |
          mkdir -p output
          find llama.cpp/build/bin -name "*.so" -exec cp {} output/ \;
          tar -czvf llama-${{ github.ref_name }}-linux-x64.tar.gz -C output .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: llama-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ github.ref_name }}
          path: llama.cpp
          submodules: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build Library
        shell: bash
        run: |
          cd llama.cpp
          mkdir -p build && cd build
          
          cmake .. \
            -G "Visual Studio 17 2022" \
            -A x64 \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON \
            -DGGML_NATIVE=OFF
          
          cmake --build . --config Release --target llama

      - name: Package Artifact
        shell: bash
        run: |
          mkdir -p output
          find llama.cpp/build/bin/Release -name "*.dll" -exec cp {} output/ \;
          tar -czvf llama-${{ github.ref_name }}-windows-x64.tar.gz -C output .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: llama-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}