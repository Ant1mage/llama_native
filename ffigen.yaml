# Run with `dart run ffigen --config ffigen.yaml`.
name: LlamaNativeBindings
description: Bindings for llama.cpp library.
output: 'lib/llama_native_bindings.dart'

ffi-native:
  asset-id: 'package:llama_native/llama_native'

headers:
  entry-points:
    - 'src/llama.cpp/include/llama.h'
    - 'src/llama.cpp/ggml/include/ggml.h'
    - 'src/llama.cpp/gguf/include/ggml-backend.h'
    - 'src/llama.cpp/tools/mtmd/mtmd.h'
    - 'src/llama.cpp/tools/mtmd/mtmd-helper.h'
    - 'src/llama_native_wrapper.h'
  include-directives:
    - 'src/llama.cpp/include/llama.h'
    - 'src/llama.cpp/ggml/include/ggml.h'
    - 'src/llama.cpp/ggml/include/ggml-backend.h'
    - 'src/llama.cpp/tools/mtmd/mtmd.h'
    - 'src/llama.cpp/tools/mtmd/mtmd-helper.h'
    - 'src/llama_native_wrapper.h'


compiler-opts:
  - "-x c"
  - "-Isrc/llama.cpp/include"
  - "-Isrc/llama.cpp/ggml/include"
  - "-Isrc/llama.cpp/tools/mtmd"
  - "-I/opt/homebrew/opt/llvm/include"
  - "-Wno-pragma-once-outside-header"

silence-enum-warning: true
